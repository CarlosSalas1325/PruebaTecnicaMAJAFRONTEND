version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ptmaja-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${FRONTEND_PORT:-4200}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3000/api}
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run start -- --host 0.0.0.0 --port 4200"
