<header class="topbar">
  <div class="container topbar-inner">
    <a routerLink="/" class="brand">PT-Maja Blog</a>

    <nav>
      <a routerLink="/" routerLinkActive="active">Posts</a>
      <a routerLink="/categories" routerLinkActive="active" *ngIf="authService.getCurrentUser()?.role === 'admin'">Categorias</a>
      <a routerLink="/login" *ngIf="!authService.isAuthenticated()">Login</a>
      <a routerLink="/register" *ngIf="!authService.isAuthenticated()">Registro</a>
      <button class="danger" (click)="logout()" *ngIf="authService.isAuthenticated()">Salir</button>
    </nav>
  </div>
</header>

<main class="container content">
  <router-outlet></router-outlet>
</main>
