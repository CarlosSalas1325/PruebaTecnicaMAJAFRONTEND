<section class="card">
  <h2>{{ isEdit ? 'Editar' : 'Nuevo' }} post</h2>

  <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">
    <div class="image-upload">
      <div class="image-preview" *ngIf="imagePreview">
        <img [src]="imagePreview" alt="Preview" />
        <button type="button" class="remove-image" (click)="removeImage()">&times;</button>
      </div>
      <label class="upload-trigger" *ngIf="!imagePreview">
        <input type="file" accept="image/*" (change)="onFileSelected($event)" hidden />
        <span *ngIf="!uploading">Haz clic para subir una imagen</span>
        <span *ngIf="uploading">Subiendo imagen...</span>
      </label>
    </div>

    <div class="field">
      <label>Titulo</label>
      <input type="text" formControlName="title" placeholder="Titulo del post" />
    </div>

    <div class="field">
      <label>Contenido</label>
      <textarea rows="8" formControlName="content" placeholder="Escribe el contenido aqui..."></textarea>
    </div>

    <div class="row-2">
      <div class="field">
        <label>Estado</label>
        <select formControlName="status">
          <option value="draft">Borrador</option>
          <option value="published">Publicado</option>
        </select>
      </div>

      <div class="field">
        <label>Categorias</label>
        <div class="categories">
          <label class="check-label" *ngFor="let category of categories">
            <input type="checkbox" [checked]="selectedCategoryIds.includes(category.id)" (change)="toggleCategory(category.id, $event)" />
            {{ category.name }}
          </label>
        </div>
      </div>
    </div>

    <p class="error" *ngIf="error">{{ error }}</p>
    <button class="primary" type="submit" [disabled]="form.invalid || uploading">Guardar</button>
  </form>
</section>
